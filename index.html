<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium DedSec</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>DedSec Elite</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#gallery">Gallery</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <h2>Welcome to DedSec</h2>
        <p>Join the digital revolution</p>
        <button id="action-btn">Explore</button>
    </section>

    <section id="about">
        <h2>About Us</h2>
        <p>We are a collective of digital freedom fighters with a taste for stylish design.</p>
    </section>

    <section id="gallery">
        <h2>Gallery</h2>
        <div class="gallery-grid">
            <img src="https://source.unsplash.com/random/400x300?tech" alt="Tech image 1">
            <img src="https://source.unsplash.com/random/400x300?hacker" alt="Tech image 2">
            <img src="https://source.unsplash.com/random/400x300?cyber" alt="Tech image 3">
        </div>
    </section>

    <section id="contact">
        <h2>Contact</h2>
        <form>
            <input type="email" placeholder="Email" required>
            <textarea placeholder="Message" required></textarea>
            <button type="submit">Send</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2025 DedSec Elite</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
